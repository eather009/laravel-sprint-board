name: Bug report
description: Report a bug in laravel-sprint-board
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve the package.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: PHP / Laravel / package versions
      placeholder: "PHP 8.3, Laravel 12, eather009/laravel-sprint-board 0.1.1"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
